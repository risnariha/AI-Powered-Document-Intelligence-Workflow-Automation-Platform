version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg15
    container_name: docintel-postgres
    environment:
      POSTGRES_DB: docintel
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d docintel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docintel-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: docintel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docintel-network

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docintel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - docintel-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    container_name: docintel-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/docintel
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend-fastapi:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - docintel-network

  # Node.js Backend (for real-time features)
  node-backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: docintel-node
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    volumes:
      - ./backend-node:/app
    depends_on:
      - redis
    command: npm run dev
    networks:
      - docintel-network

  # React Frontend
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: docintel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - docintel-network

  # Kafka (optional - for production)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: docintel-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - docintel-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: docintel-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - docintel-network

networks:
  docintel-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_uploads: